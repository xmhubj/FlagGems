# FlagGems backends Configuration
# This file defines environmentsettings for weekly testing
name: H800
vendor: Nvidia

# Runner labels for this backends (self-hosted)
runner_labels: h800-flaggems-weekly

# Container image for this backends
container_image: harbor.baai.ac.cn/flaggems/nvidia-flaggems-test-h800:2026701

# Container volumes to mount for this backends
container_volumes:
  - /data:/data
  - /home:/home
  - /tmp:/tmp

# Container options for this backends
container_options: >-
  --uts=host
  --ipc=host
  --user 0
  --security-opt=seccomp=unconfined
  --privileged
  --ulimit=stack=67108864
  --ulimit=memlock=-1
  --shm-size=32G
  --gpus all

# GPUs to test for this backends
test_gpus: "0,1,2,3,4,5,6,7"

# GPU availability check script for this backend
gpu_check_script: tools/gpu_check_nvidia.sh

# Output base directory for this backends
output_base_dir: /home/flaggems/weekly_test
