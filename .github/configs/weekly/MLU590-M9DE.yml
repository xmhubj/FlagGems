# FlagGems backends Configuration
# This file defines environment settings for weekly testing
name: MLU590-M9DE
vendor: Cambricon

# Runner labels for this backends (self-hosted)
runner_labels: mlu590-m9de-flaggems-weekly

# Container image for this backends
container_image: harbor.baai.ac.cn/flaggems/cambricon-flaggems-test-mlu590-m9de-triton3-2-1:20260618

# Container volumes to mount for this backends
container_volumes:
  - /usr/bin/cnmon:/usr/bin/cnmon
  - /etc/hosts:/etc/hosts
  - /cambricon:/cambricon
  - /home:/home
  - /tmp:/tmp

# Container options for this backends
container_options: >-
  --network=host
  --cap-add=SYS_PTRACE
  --privileged
  --shm-size=32g
  --workdir=/cambricon
  --device=/dev/cambricon_ctl

# GPUs to test for this backends
test_gpus: "0,1,2,3,4,5,6,7"

# GPU availability check script for this backend
gpu_check_script: tools/gpu_check_cambricon.sh

# Output base directory for this backends
output_base_dir: /home/flaggems/weekly
