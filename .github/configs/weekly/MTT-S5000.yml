# FlagGems backends Configuration
# This file defines environment settings for weekly testing
name: MTT-S5000
vendor: MThreads

# Runner labels for this backends (self-hosted)
runner_labels: s5000-flaggems-weekly

# Container image for this backends
container_image: harbor.baai.ac.cn/flaggems/mthreads-flaggems-test-mtt-s5000:20260701

# Container volumes to mount for this backends
container_volumes:
  - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu
  - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu
  - /etc/alternatives:/etc/alternatives
  - /etc/localtime:/etc/localtime:ro
  - /data:/data
  - /home:/home
  - /tmp:/tmp

# Container options for this backends
container_options: >-
  --pid=host
  --privileged
  --cap-add=SYS_PTRACE
  --shm-size=16g
  --security-opt seccomp=unconfined
  --env MTHREADS_VISIBLE_DEVICES=all
  --env MTHREADS_DRIVER_CAPABILITIES=all
  --workdir=/root

# GPUs to test for this backends
test_gpus: "0,1,2,3,4,5,6,7"

# GPU availability check script for this backend
gpu_check_script: tools/gpu_check_mthreads.sh

# Output base directory for this backends
output_base_dir: /home/flaggems/weekly
